name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd "target/${{ matrix.target }}/release"
          tar czf "dirsweep-v${VERSION}-${{ matrix.target }}.tar.gz" dirsweep

      - name: Package (Windows)
        if: matrix.ext == '.exe'
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          cd "target/${{ matrix.target }}/release"
          Compress-Archive -Path dirsweep.exe -DestinationPath "dirsweep-v${version}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirsweep-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/dirsweep-*

  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dirsweep-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dirsweep-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            dirsweep-*
            checksums.txt

  publish-crates:
    name: Publish to crates.io
    needs: [build]
    runs-on: ubuntu-latest
    environment: cicd
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo check --locked
      - run: cargo publish --locked

  publish-npm:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-latest
    environment: cicd
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync version + include assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          cp ../LICENSE .
          cp ../README.md .

      - name: Publish
        run: |
          cd npm
          npm publish --access public

